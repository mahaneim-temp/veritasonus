# fly.io 배포 설정 — 실 운영시 region/scale은 측정 후 조정.
app = "lucid-realtime-gateway"
primary_region = "nrt"   # 한국 사용자 → 도쿄

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  HOST = "0.0.0.0"
  PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
